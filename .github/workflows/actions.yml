 
name: Remote Deployment 

on:  
  push:      
    branches:  
      - main
env:  
  Region: ap-south-1
  
  

jobs:  
  terraform:
    runs-on: ubuntu-latest 
    
    
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
       
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.3.7"  
          
       

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:  ${{ env.Region }}

      - name: Register ECS Task Definition
        run: |
         aws ecs register-task-definition \
         --cli-input-json file://tomcat-task.json   

      - name: init
        run: terraform init

      - name: plan
        run: terraform plan

      - name: apply
        run: terraform apply -auto-approve

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: repo check
        run: aws ecr create-repository --repository-name tomcat  --region ${{ env.Region }}
        continue-on-error: true

        

      - name: build
        run:  docker build -t tomcat .

      - name: tag
        run: docker tag tomcat:latest 748716953870.dkr.ecr.ap-south-1.amazonaws.com/tomcat:latest
           
      - name: push    
        run:  docker push 748716953870.dkr.ecr.ap-south-1.amazonaws.com/tomcat:latest 

      - name: Render ECS Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
         task-definition: tomcat-task.json
         container-name: tomcat-container
         image: 748716953870.dkr.ecr.ap-south-1.amazonaws.com/tomcat:latest 

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
         task-definition: ${{ steps.task-def.outputs.task-definition }}
         service: nginx_service
         cluster: ecs_cluster
         wait-for-service-stability: true   
             

    

      
    



      
      

      
      

      

      

        


      

      
        

        

        

      
